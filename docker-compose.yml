name: cambium-fiber-mock-olt

services:
  # F6ZF01C8P631 - Mock OLT (plano-core)
  mock-olt-631:
    container_name: cambium-fiber-api-mock-olt-631
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - FIXTURE_FILE=F6ZF01C8P631.json
      - OLT_VERSION=1.3
      - OLT_USERNAME=${OLT_USERNAME:-admin}
      - OLT_PASSWORD=${OLT_PASSWORD:-password}
      - MOCK_LATENCY_MS=${MOCK_LATENCY_MS:-1100}
    networks:
      - api-network
    ports:
      - "8800:443"
      - "8801:22"
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:443/health"]
      interval: 5s
      timeout: 3s
      retries: 3

